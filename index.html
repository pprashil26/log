<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Action Log</title>
  <style>
    :root{
      --bg:#0b0f14;
      --card:#0f1623;
      --muted:#8aa0b8;
      --text:#e8f0ff;
      --accent:#4aa3ff;
      --line:#1b2a3f;
      --danger:#ff5a6a;
      --ok:#63e6be;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:var(--sans);
      background:radial-gradient(1200px 700px at 20% -10%, #13213a 0%, transparent 55%),
                 radial-gradient(900px 600px at 100% 0%, #102033 0%, transparent 55%),
                 var(--bg);
      color:var(--text);
    }
    .wrap{max-width:860px;margin:0 auto;padding:18px 14px 44px}
    header{display:flex;gap:10px;align-items:baseline;justify-content:space-between;margin:8px 0 14px}
    h1{margin:0;font-size:18px;letter-spacing:.2px}
    .hint{color:var(--muted);font-size:12px}
    .bar{
      display:flex; gap:8px; flex-wrap:wrap;
      background:rgba(15,22,35,.75);
      border:1px solid var(--line);
      border-radius:16px;
      padding:10px;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
      backdrop-filter: blur(8px);
    }
    textarea#input{
      flex:1 1 360px;
      min-height:44px;
      max-height:160px;
      resize:vertical;
      width:100%;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#0c1320;
      color:var(--accent); /* blue input text */
      outline:none;
      font-family:var(--mono);
      font-size:14px;
      line-height:1.3;
    }
    textarea#input:focus{border-color:#2a68ff55; box-shadow:0 0 0 3px #2a68ff22}
    .btn{
      appearance:none;
      border:1px solid var(--line);
      background:#0c1320;
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      font-size:12px;
      transition:transform .06s ease, border-color .12s ease, background .12s ease;
      white-space:nowrap;
    }
    .btn:hover{border-color:#2a68ff55}
    .btn:active{transform:translateY(1px)}
    .btn.primary{border-color:#2a68ff66; background:#0d1a2b}
    .btn.danger{border-color:#ff5a6a55;color:#ffd1d6}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .small{font-size:12px;color:var(--muted)}
    .log{
      margin-top:14px;
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      background:rgba(15,22,35,.65);
      box-shadow:0 10px 30px rgba(0,0,0,.25);
      backdrop-filter: blur(8px);
    }
    .day{
      border-top:1px solid var(--line);
      padding:10px 12px;
      background:rgba(12,19,32,.6);
      color:var(--muted);
      font-size:12px;
      letter-spacing:.2px;
      display:flex;justify-content:space-between;align-items:center;
      font-family:var(--mono);
    }
    .entry{
      display:flex;
      gap:10px;
      padding:10px 12px;
      border-top:1px dashed rgba(27,42,63,.7);
      align-items:flex-start;
      font-family:var(--mono);
      font-size:13px;
      line-height:1.35;
      background:rgba(15,22,35,.35);
    }
    .entry:first-of-type{border-top:none}
    .ts{color:var(--muted); min-width:82px; padding-top:1px}
    .msg{white-space:pre-wrap; word-break:break-word; color:var(--text); flex:1}
    .actions{display:flex; gap:6px; align-items:flex-start; padding-top:1px}
    .iconbtn{
      width:30px;height:30px;
      display:grid;place-items:center;
      border-radius:10px;
      border:1px solid rgba(27,42,63,.9);
      background:#0c1320;
      cursor:pointer;
      padding:0;
    }
    .iconbtn:hover{border-color:#2a68ff55}
    .iconbtn:active{transform:translateY(1px)}
    .iconbtn svg{width:16px;height:16px;fill:none;stroke:var(--text);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;opacity:.9}
    .iconbtn.danger svg{stroke:#ffd1d6}
    .iconbtn.danger{border-color:#ff5a6a55}
    .iconbtn.ok{border-color:rgba(99,230,190,.45)}
    .iconbtn.ok svg{stroke:var(--ok)}
    .editbox{
      width:100%;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#0c1320;
      color:var(--accent);
      outline:none;
      font-family:var(--mono);
      font-size:13px;
      line-height:1.35;
      min-height:38px;
      resize:vertical;
    }
    .editrow{display:flex; gap:6px; margin-top:8px}
    .empty{padding:16px;color:var(--muted);font-family:var(--mono);font-size:13px}
    .footer{margin-top:10px;color:var(--muted);font-size:12px}
    .kbd{font-family:var(--mono);border:1px solid var(--line);padding:1px 6px;border-radius:8px;background:#0c1320;color:var(--text)}
    @media (max-width:520px){
      textarea#input{font-size:16px} /* better mobile typing */
      header{flex-direction:column;gap:6px;align-items:flex-start}
      .hint{line-height:1.25}
      .btn{padding:10px 10px}
      .ts{min-width:74px}
      .actions{gap:5px}
      .iconbtn{width:32px;height:32px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Action Log</h1>
      <div class="hint">
        <span class="kbd">Enter</span> add · <span class="kbd">Shift+Enter</span> newline ·
        <span class="kbd">Ctrl+/</span> focus
      </div>
    </header>

    <div class="bar">
      <textarea id="input" placeholder="Type an action…"></textarea>
      <div class="row">
        <button class="btn primary" id="add">Add</button>
        <button class="btn" id="export">Export .txt</button>
        <button class="btn" id="importBtn">Import .txt</button>
        <button class="btn danger" id="clear">Clear</button>
        <input id="file" type="file" accept=".txt,text/plain" style="display:none" />
        <div class="small" id="count"></div>
      </div>
    </div>

    <div class="log" id="log"></div>

    <div class="footer">
      Stored locally in your browser (localStorage). For backup, use Export.
    </div>
  </div>

<script>
(() => {
  const KEY = "actionLog.v2"; // bump version since entries now have ids
  const OLD_KEYS = ["actionLog.v1"]; // migrate if found
  const $ = (id) => document.getElementById(id);

  const input = $("input");
  const addBtn = $("add");
  const exportBtn = $("export");
  const importBtn = $("importBtn");
  const clearBtn = $("clear");
  const file = $("file");
  const logEl = $("log");
  const countEl = $("count");

  /** @type {{id:string, ts:number, msg:string}[]} */
  let items = [];
  /** @type {string|null} */
  let editingId = null;

  function pad(n){ return String(n).padStart(2,"0"); }
  function fmtDate(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
  function fmtTime(d){ return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`; }
  function fmtStamp(d){ return `${fmtDate(d)} ${fmtTime(d)}`; }

  function uid(ts){
    // small unique id: timestamp + 4 random chars
    return String(ts) + "-" + Math.random().toString(36).slice(2,6);
  }

  function normalize(arr){
    // ensure array + ids exist
    if (!Array.isArray(arr)) return [];
    return arr
      .filter(x => x && typeof x === "object")
      .map(x => ({
        id: (typeof x.id === "string" && x.id) ? x.id : uid(x.ts || Date.now()),
        ts: Number.isFinite(x.ts) ? x.ts : Date.now(),
        msg: (x.msg ?? "").toString()
      }))
      .filter(x => x.msg.trim().length > 0);
  }

  function load(){
    // Prefer v2; else migrate v1 if present
    let raw = localStorage.getItem(KEY);
    if (!raw){
      for (const k of OLD_KEYS){
        const old = localStorage.getItem(k);
        if (old){
          raw = old;
          break;
        }
      }
    }
    try{
      const parsed = raw ? JSON.parse(raw) : [];
      items = normalize(parsed);
    } catch(e){
      items = [];
    }
    // Save back into v2 format to complete migration
    save();
  }

  function save(){
    localStorage.setItem(KEY, JSON.stringify(items));
  }

  function addEntry(msg){
    const text = (msg ?? "").trim();
    if (!text) return;
    const ts = Date.now();
    items.push({ id: uid(ts), ts, msg: text });
    save();
    render();
  }

  function updateEntry(id, newMsg){
    const text = (newMsg ?? "").trim();
    if (!text) return false;
    const idx = items.findIndex(x => x.id === id);
    if (idx === -1) return false;
    items[idx].msg = text;
    save();
    return true;
  }

  function deleteEntry(id){
    const idx = items.findIndex(x => x.id === id);
    if (idx === -1) return false;
    items.splice(idx, 1);
    save();
    return true;
  }

  function groupByDay(entries){
    const out = [];
    let currentDay = null, bucket = null;
    for (const e of entries){
      const day = fmtDate(new Date(e.ts));
      if (day !== currentDay){
        currentDay = day;
        bucket = { day, entries: [] };
        out.push(bucket);
      }
      bucket.entries.push(e);
    }
    return out;
  }

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }

  function iconPencil(){
    return `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 20h9"></path>
        <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path>
      </svg>`;
  }
  function iconTrash(){
    return `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 6h18"></path>
        <path d="M8 6V4h8v2"></path>
        <path d="M19 6l-1 14H6L5 6"></path>
        <path d="M10 11v6"></path>
        <path d="M14 11v6"></path>
      </svg>`;
  }
  function iconCheck(){
    return `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20 6L9 17l-5-5"></path>
      </svg>`;
  }
  function iconX(){
    return `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M18 6L6 18"></path>
        <path d="M6 6l12 12"></path>
      </svg>`;
  }

  function render(){
    countEl.textContent = `${items.length} entr${items.length===1?"y":"ies"}`;
    if (!items.length){
      logEl.innerHTML = `<div class="empty">No entries yet. Type something above and press Enter.</div>`;
      return;
    }

    // Sort oldest->newest for grouping, then render newest day first
    const sorted = [...items].sort((a,b)=>a.ts-b.ts);
    const groups = groupByDay(sorted).reverse();

    let html = "";
    for (const g of groups){
      const dayCount = g.entries.length;
      html += `
        <div class="day">
          <div>${g.day}</div>
          <div>${dayCount} entr${dayCount===1?"y":"ies"}</div>
        </div>
      `;

      // newest first within day
      const entries = [...g.entries].sort((a,b)=>b.ts-a.ts);
      for (const e of entries){
        const d = new Date(e.ts);
        const isEditing = (editingId === e.id);

        if (!isEditing){
          html += `
            <div class="entry" data-id="${escapeHtml(e.id)}">
              <div class="ts">${escapeHtml(fmtTime(d))}</div>
              <div class="msg">${escapeHtml(e.msg)}</div>
              <div class="actions">
                <button class="iconbtn" data-action="edit" title="Edit" aria-label="Edit">${iconPencil()}</button>
                <button class="iconbtn danger" data-action="delete" title="Delete" aria-label="Delete">${iconTrash()}</button>
              </div>
            </div>
          `;
        } else {
          // Edit mode
          html += `
            <div class="entry" data-id="${escapeHtml(e.id)}">
              <div class="ts">${escapeHtml(fmtTime(d))}</div>
              <div class="msg">
                <textarea class="editbox" data-role="editbox">${escapeHtml(e.msg)}</textarea>
                <div class="editrow">
                  <button class="iconbtn ok" data-action="save" title="Save" aria-label="Save">${iconCheck()}</button>
                  <button class="iconbtn" data-action="cancel" title="Cancel" aria-label="Cancel">${iconX()}</button>
                </div>
              </div>
              <div class="actions"></div>
            </div>
          `;
        }
      }
    }

    logEl.innerHTML = html;

    // If editing, focus the edit textarea
    if (editingId){
      const row = logEl.querySelector(`.entry[data-id="${CSS.escape(editingId)}"]`);
      const box = row && row.querySelector('[data-role="editbox"]');
      if (box){
        box.focus();
        // place cursor at end
        box.selectionStart = box.selectionEnd = box.value.length;
      }
    }
  }

  function exportTxt(){
    // Oldest->newest, durable format:
    // YYYY-MM-DD HH:mm:ss - message
    const sorted = [...items].sort((a,b)=>a.ts-b.ts);
    const lines = sorted.map(e => `${fmtStamp(new Date(e.ts))} - ${e.msg.replace(/\r?\n/g, "\\n")}`);
    const blob = new Blob([lines.join("\n") + "\n"], {type:"text/plain;charset=utf-8"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `action-log_${fmtDate(new Date())}.txt`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  }

  function parseImportedText(text){
    const now = Date.now();
    const lines = text.split(/\r?\n/).filter(Boolean);
    const imported = [];
    let offset = 0;

    for (const line of lines){
      const m = line.match(/^(\d{4}-\d{2}-\d{2})\s+(\d{2}:\d{2}:\d{2})\s+-\s+(.*)$/);
      if (m){
        const [_, ymd, hms, msgRaw] = m;
        const ts = Date.parse(ymd + "T" + hms);
        const msg = (msgRaw || "").replace(/\\n/g, "\n").trim();
        if (!Number.isNaN(ts) && msg){
          imported.push({ id: uid(ts), ts, msg });
        }
      } else {
        const msg = line.trim();
        if (msg){
          const ts = now + (offset++);
          imported.push({ id: uid(ts), ts, msg });
        }
      }
    }
    return imported;
  }

  // --- Events ---
  addBtn.addEventListener("click", () => {
    addEntry(input.value);
    input.value = "";
    input.focus();
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey){
      e.preventDefault();
      addBtn.click();
    }
  });

  exportBtn.addEventListener("click", exportTxt);

  importBtn.addEventListener("click", () => file.click());

  file.addEventListener("change", async () => {
    const f = file.files && file.files[0];
    file.value = "";
    if (!f) return;
    const text = await f.text();
    const imported = parseImportedText(text);
    if (!imported.length){
      alert("No valid lines found to import.");
      return;
    }
    items = items.concat(imported);

    // optional de-dup (timestamp+message)
    const seen = new Set();
    items = items.filter(e => {
      const k = e.ts + "|" + e.msg;
      if (seen.has(k)) return false;
      seen.add(k);
      return true;
    });

    save();
    render();
  });

  clearBtn.addEventListener("click", () => {
    const ok = confirm("Clear ALL entries? This cannot be undone (export first if needed).");
    if (!ok) return;
    items = [];
    editingId = null;
    save();
    render();
    input.focus();
  });

  // Keyboard shortcut: Ctrl+/ (or Cmd+/) focuses input
  document.addEventListener("keydown", (e) => {
    const isMac = navigator.platform.toLowerCase().includes("mac");
    const mod = isMac ? e.metaKey : e.ctrlKey;
    if (mod && e.key === "/"){
      e.preventDefault();
      input.focus();
    }
  });

  // Event delegation for edit/delete/save/cancel
  logEl.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-action]");
    if (!btn) return;
    const action = btn.getAttribute("data-action");
    const row = btn.closest(".entry");
    if (!row) return;
    const id = row.getAttribute("data-id");
    if (!id) return;

    if (action === "edit"){
      editingId = id;
      render();
      return;
    }

    if (action === "cancel"){
      editingId = null;
      render();
      return;
    }

    if (action === "save"){
      const box = row.querySelector('[data-role="editbox"]');
      const newMsg = box ? box.value : "";
      const ok = updateEntry(id, newMsg);
      if (!ok){
        alert("Entry cannot be empty.");
        return;
      }
      editingId = null;
      render();
      return;
    }

    if (action === "delete"){
      const ok = confirm("Delete this entry?");
      if (!ok) return;
      deleteEntry(id);
      if (editingId === id) editingId = null;
      render();
      return;
    }
  });

  // Save edit with Ctrl+Enter (or Cmd+Enter) when in edit box
  logEl.addEventListener("keydown", (e) => {
    const box = e.target.closest('[data-role="editbox"]');
    if (!box) return;
    const isMac = navigator.platform.toLowerCase().includes("mac");
    const mod = isMac ? e.metaKey : e.ctrlKey;
    if (mod && e.key === "Enter"){
      e.preventDefault();
      const row = box.closest(".entry");
      const id = row && row.getAttribute("data-id");
      if (!id) return;
      const ok = updateEntry(id, box.value);
      if (!ok){
        alert("Entry cannot be empty.");
        return;
      }
      editingId = null;
      render();
    }
    if (e.key === "Escape"){
      e.preventDefault();
      editingId = null;
      render();
    }
  });

  // Init
  load();
  render();
  input.focus();
})();
</script>
</body>
</html>
